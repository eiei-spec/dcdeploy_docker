name: Run Argosbx Docker

# 触发条件：当你点击运行按钮时，或者当你修改代码时触发
on:
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  run-docker-job:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Linux 系统

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub (Optional)
        # 如果是公开镜像，这步其实可以省略，但加上能避免网络限制
        run: echo "Starting Docker execution..."

      - name: Pull and Run Docker Container
        run: |
          echo "正在从 Docker Hub 下载镜像..."
          docker pull ygkkk/argosbx:latest
          
          echo "镜像下载成功，正在启动容器..."
          # -d 代表在后台运行。如果你的镜像需要传入特定参数（如 -p 80:80），可以加在后面
          docker run -d --name my-container ygkkk/argosbx:latest
          
          echo "容器启动成功！查看当前运行状态："
          docker ps -a
